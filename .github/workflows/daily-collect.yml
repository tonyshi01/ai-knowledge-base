name: Daily Collection

on:
  # schedule:
  #  - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        id: pipeline
        run: |
          python pipeline/pipeline.py \
            --sources github,rss \
            --limit 20 \
            --verbose \
            2>&1 | tee pipeline_output.txt
          ARTICLES=$(grep -oP 'Pipeline complete  articles=\K\d+' pipeline_output.txt || echo "0")
          echo "articles=${ARTICLES}" >> "$GITHUB_OUTPUT"
          echo "Collected ${ARTICLES} articles"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Validate articles
        if: steps.pipeline.outputs.articles != '0'
        continue-on-error: true
        run: python hooks/validate_json.py knowledge/articles/*.json

      - name: Check article quality
        if: steps.pipeline.outputs.articles != '0'
        continue-on-error: true
        run: python hooks/check_quality.py knowledge/articles/*.json

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No new articles to commit"
            exit 0
          fi
          ARTICLES="${{ steps.pipeline.outputs.articles }}"
          DATE=$(date -u +"%Y-%m-%d")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: daily collection ${DATE} (${ARTICLES} articles)"
          git push
