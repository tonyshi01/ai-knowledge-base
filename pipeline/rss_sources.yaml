# RSS sources for AI Knowledge Base pipeline
# High-volume sources are disabled by default; enable explicitly via CLI.

sources:
  # ── 综合技术 ──
  - name: "Hacker News Best (AI)"
    url: "https://hnrss.org/best?q=AI+LLM+agent+langchain+openai+anthropic+deepseek"
    category: general_tech
    enabled: true
    notes: "HN Best 按关键词过滤 AI 相关内容"

  - name: "Lobsters AI/ML"
    url: "https://lobste.rs/t/ai.rss"
    category: general_tech
    enabled: true

  # ── AI 研究 ──
  - name: "arXiv cs.AI"
    url: "https://rss.arxiv.org/rss/cs.AI"
    category: research
    enabled: false
    notes: "每日发文量极大，按需启用"

  # ── 公司博客 ──
  - name: "OpenAI Blog"
    url: "https://openai.com/feed/feed.xml"
    category: company_blog
    enabled: true

  - name: "Anthropic Research"
    url: "https://www.anthropic.com/feed.xml"
    category: company_blog
    enabled: true

  - name: "Hugging Face Blog"
    url: "https://huggingface.co/blog/feed.xml"
    category: company_blog
    enabled: true

  # ── 中文社区 ──
  - name: "机器之心"
    url: "https://jiqizhixin.com/rss"
    category: chinese_community
    enabled: false
    notes: "RSS 可用性待确认"

  - name: "量子位"
    url: "https://www.qbitai.com/feed"
    category: chinese_community
    enabled: false
    notes: "RSS 可用性待确认"

  - name: "Google AI Blog"
    url: "https://blog.google/technology/ai/rss/"
    category: industry
    enabled: false
    notes: "RSS 可用性待确认"
